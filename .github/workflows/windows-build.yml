name: Windows Build

# Build the Flutter Windows desktop app and package it as an Inno Setup
# installer on a GitHub-hosted Windows runner.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter 3.24.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows release + installer
        shell: cmd
        run: scripts\windows\build_installer.bat

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: richtext-windows-installer
          path: build/installer/*.exe
          if-no-files-found: error
